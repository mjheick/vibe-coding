<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Camera Code Reader</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }

    h1 {
      font-size: 1.4rem;
      margin-bottom: 1.2rem;
      font-weight: 500;
    }

    #scanner-container {
      position: relative;
      width: 100%;
      max-width: 500px;
      display: none;
    }

    #reader {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
    }

    #stop-btn {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(220, 40, 40, 0.85);
      color: #fff;
      border: none;
      padding: 10px 28px;
      border-radius: 24px;
      font-size: 1rem;
      cursor: pointer;
      backdrop-filter: blur(4px);
    }

    #stop-btn:hover { background: rgba(200, 20, 20, 0.95); }

    #start-btn {
      background: #0f3460;
      color: #fff;
      border: none;
      padding: 14px 36px;
      border-radius: 28px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    #start-btn:hover { background: #16213e; }
    #start-btn:disabled { opacity: 0.5; cursor: default; }

    .result-area {
      margin-top: 1.5rem;
      width: 100%;
      max-width: 500px;
      display: none;
      text-align: center;
    }

    .result-area label {
      display: block;
      margin-bottom: 0.4rem;
      font-size: 0.9rem;
      color: #aaa;
    }

    #result {
      width: 100%;
      padding: 12px 16px;
      font-size: 1.15rem;
      border: 2px solid #0f3460;
      border-radius: 10px;
      background: #16213e;
      color: #fff;
      text-align: center;
      outline: none;
    }

    #result:focus { border-color: #e94560; }

    .format-tag {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 4px 12px;
      background: #0f3460;
      border-radius: 12px;
      font-size: 0.8rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <h1>📷 Camera Code Reader</h1>

  <button id="start-btn" aria-label="Start camera scanner">Start Scanner</button>

  <div id="scanner-container">
    <div id="reader"></div>
    <button id="stop-btn" aria-label="Stop camera scanner">✕ Close Scanner</button>
  </div>

  <div class="result-area" id="result-area">
    <label for="result">Detected Code</label>
    <input type="text" id="result" readonly />
    <span class="format-tag" id="format-tag"></span>
  </div>

  <script>
    const startBtn = document.getElementById("start-btn");
    const stopBtn = document.getElementById("stop-btn");
    const scannerContainer = document.getElementById("scanner-container");
    const resultArea = document.getElementById("result-area");
    const resultInput = document.getElementById("result");
    const formatTag = document.getElementById("format-tag");

    let html5QrCode = null;

    const supportedFormats = [
      Html5QrcodeSupportedFormats.QR_CODE,
      Html5QrcodeSupportedFormats.UPC_A,
      Html5QrcodeSupportedFormats.UPC_E,
      Html5QrcodeSupportedFormats.EAN_13,
      Html5QrcodeSupportedFormats.EAN_8,
      Html5QrcodeSupportedFormats.CODE_128,
      Html5QrcodeSupportedFormats.CODE_39,
    ];

    function formatName(format) {
      const names = {
        0: "QR Code", 1: "AZTEC", 2: "CODABAR", 3: "CODE 39",
        4: "CODE 93", 5: "CODE 128", 6: "DATA MATRIX", 7: "MAXICODE",
        8: "ITF", 9: "EAN-13", 10: "EAN-8", 11: "PDF 417",
        12: "RSS 14", 13: "RSS EXPANDED", 14: "UPC-A", 15: "UPC-E", 16: "UPC EAN"
      };
      return names[format] || "Unknown";
    }

    async function startScanner() {
      startBtn.disabled = true;
      scannerContainer.style.display = "block";
      resultArea.style.display = "none";

      html5QrCode = new Html5Qrcode("reader", {
        formatsToSupport: supportedFormats,
        verbose: false,
      });

      try {
        await html5QrCode.start(
          { facingMode: "environment" },
          {
            fps: 15,
            qrbox: (viewfinderWidth, viewfinderHeight) => {
              // Wide rectangle for barcodes, responsive to viewport
              const w = Math.min(Math.floor(viewfinderWidth * 0.85), 450);
              const h = Math.min(Math.floor(viewfinderHeight * 0.50), 220);
              return { width: w, height: h };
            },
            aspectRatio: 1.0,
            disableFlip: false,
          },
          (decodedText, decodedResult) => {
            resultInput.value = decodedText;
            formatTag.textContent = formatName(decodedResult.result.format.format);
            stopScanner();
            resultArea.style.display = "block";
          },
          () => {} // ignore scan failures (no code in frame)
        );
      } catch (err) {
        alert("Could not access camera: " + err);
        scannerContainer.style.display = "none";
        startBtn.disabled = false;
      }
    }

    async function stopScanner() {
      if (html5QrCode && html5QrCode.isScanning) {
        await html5QrCode.stop();
      }
      html5QrCode = null;
      scannerContainer.style.display = "none";
      startBtn.disabled = false;
    }

    startBtn.addEventListener("click", startScanner);
    stopBtn.addEventListener("click", () => {
      stopScanner();
      resultArea.style.display = "none";
    });
  </script>
</body>
</html>
